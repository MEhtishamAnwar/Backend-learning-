<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="min-h-screen bg-slate-50">
    <div class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-6 py-16">
        <div class="w-full rounded-3xl border border-slate-200 bg-white p-10 text-center shadow-xl">
            <p class="mb-3 text-sm font-semibold uppercase tracking-[0.3em] text-rose-500">404</p>
            <h1 class="mb-4 text-4xl font-bold text-slate-900">Page not found</h1>
            <p class="mb-8 text-slate-600">The page you are looking for does not exist or may have been moved.</p>
            <a href="/" class="rounded-full bg-slate-900 px-6 py-3 font-semibold text-white transition hover:bg-slate-700">Go back home</a>
        </div>
    </div>
</body>
</html>
